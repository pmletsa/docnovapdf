version: '3.8'

services:
  pdf-engine:
    build:
      context: ../..
      dockerfile: infra/docker/pdf-engine.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
    restart: unless-stopped

  conversion-engine:
    build:
      context: ../..
      dockerfile: infra/docker/conversion-engine.Dockerfile
    ports:
      - "8002:8002"
    environment:
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
    restart: unless-stopped

  ocr-engine:
    build:
      context: ../..
      dockerfile: infra/docker/ocr-engine.Dockerfile
    ports:
      - "8003:8003"
    environment:
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
    restart: unless-stopped

  ai-engine:
    build:
      context: ../..
      dockerfile: infra/docker/ai-engine.Dockerfile
    ports:
      - "8004:8004"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
